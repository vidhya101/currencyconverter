apiVersion: argoproj.io/v1alpha1   # ArgoCD CRD API version
kind: Application                 # Defines a GitOps Application in ArgoCD

metadata:
  name: currencyconverter-production   # Application name in ArgoCD UI (production environment)
  namespace: argocd                   # ArgoCD controller namespace

spec:
  project: default                    # ArgoCD project (used for grouping + RBAC)

  source:
    repoURL: 'https://github.com/vidhya101/currencyconverter.git'  # Git repo (source of truth)
    targetRevision: HEAD        # Always deploy latest commit (risky for production)
    path: k8s/overlays/production   # Production-specific Kubernetes manifests (Kustomize overlay)

  destination:
    server: 'https://kubernetes.default.svc'   # In-cluster Kubernetes API endpoint
    namespace: default                        # Deploy resources into default namespace

  syncPolicy:
    automated:                # Enable auto-sync (Git → Cluster)
      selfHeal: true          # Fix drift if cluster state changes manually
      prune: true             # Remove resources from cluster if removed from Git

# ============================================================
# BELOW IS FULL EXPLANATION OF WHAT THIS YAML DOES
# ============================================================
#
# 1. PURPOSE
# This YAML defines a PRODUCTION ArgoCD application for the currencyconverter app.
# It follows GitOps principles where Git is the single source of truth.
#
# ------------------------------------------------------------
#
# 2. WORKFLOW (END-TO-END FLOW)
#
# Step 1: ArgoCD monitors the Git repository
# Step 2: Reads manifests from k8s/overlays/production
# Step 3: Applies them into Kubernetes cluster (default namespace)
# Step 4: Keeps watching Git for changes
# Step 5: Automatically syncs any updates
#
# ------------------------------------------------------------
#
# 3. SOURCE SECTION (IMPORTANT - KUSTOMIZE USAGE)
#
# path: k8s/overlays/production
#
# This indicates you are using Kustomize overlays:
#
# k8s/
#   ├── base/
#   ├── overlays/
#        ├── dev/
#        ├── staging/
#        ├── production/
#
# Production overlay contains:
# - production configs
# - environment-specific variables
# - replica counts
# - resource limits
#
# ------------------------------------------------------------
#
# 4. TARGET REVISION (CRITICAL)
#
# targetRevision: HEAD means:
# - Always deploy latest commit
# - No version control
# - Dangerous for production
#
# Recommended:
# targetRevision: main
# OR
# targetRevision: v1.0.0 (tag-based deployment)
#
# ------------------------------------------------------------
#
# 5. DESTINATION SECTION
#
# server: https://kubernetes.default.svc
# → Deploy inside SAME cluster where ArgoCD is running
#
# namespace: default
# → All resources (pods, services, etc.) will be created in default namespace
#
# ------------------------------------------------------------
#
# 6. AUTOMATED SYNC (CORE GITOPS FEATURE)
#
# automated → enables continuous deployment
#
# selfHeal:
# If someone manually changes or deletes resources using kubectl,
# ArgoCD will revert cluster back to Git-defined state
#
# prune:
# If resource is removed from Git,
# ArgoCD will delete it from cluster automatically
#
# ------------------------------------------------------------
#
# 7. REAL WORLD SCENARIOS
#
# Case 1:
# You update deployment.yaml → push to Git
# → ArgoCD auto-deploys changes
#
# Case 2:
# You delete resource from Git
# → ArgoCD deletes it from cluster
#
# Case 3:
# Someone deletes pod manually
# → ArgoCD recreates it (self-healing)
#
# ------------------------------------------------------------
#
# 8. WHY OVERLAYS ARE IMPORTANT
#
# Using overlays allows:
# - Separate configs per environment
# - Same base code reused
# - Clean Dev → Staging → Prod promotion
#
# Example:
# Dev → 1 replica
# Prod → 3 replicas + resource limits
#
# ------------------------------------------------------------
#
# 9. COMMON ISSUES (BASED ON YOUR EXPERIENCE)
#
# - Cluster not reachable → App stuck in Deleting / Syncing
# - Wrong path → OutOfSync / Missing
# - API server down → ArgoCD fails
# - ConfigMap not updated → old data served
#
# ------------------------------------------------------------
#
# 10. PRODUCTION IMPROVEMENTS
#
# Replace:
# targetRevision: HEAD
#
# With:
# targetRevision: main
# OR version tags like:
# targetRevision: v2.0.0
#
# Add:
# syncOptions:
# - CreateNamespace=true
#
# ------------------------------------------------------------
#
# FINAL SUMMARY
#
# This YAML tells ArgoCD:
# "Deploy the production version of my app from Git using Kustomize overlays,
# keep it continuously in sync, and automatically fix or remove resources
# based on Git changes."
#
# ============================================================
